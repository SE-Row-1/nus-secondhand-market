version: '3.8'

services:
  web:
    build:
      context: services/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:80" 
    # image: z1yoon/nus-secondhand-market-frontend:latest
    ports:
      - "3000:3000"
    restart: always
    user: root
    networks:
      - local
  account:
    build:
      context: services/account
      dockerfile: Dockerfile
    # image: z1yoon/nus-secondhand-market-backend:latest
    ports:
      - "8081:8081"
    restart: always
    environment:
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/postgres
      - POSTGRES_USERNAME=root
      - POSTGRES_PASSWORD=root
    depends_on:
      - postgres
    networks:
      - local

  # item:
  #   build:
  #     context: services/item
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - ""


  postgres:
    image: postgres:latest
    user: root
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - local

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"  
    environment:
      MONGO_INITDB_ROOT_USERNAME: root  # modify
      MONGO_INITDB_ROOT_PASSWORD: root  # modify
    volumes:
      - mongo-data:/data/db  # Persist MongoDB data to a Docker volume
    networks:
      - local



  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"  
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf 
    networks:
      - local

volumes:
  pgdata:

  mongo-data:


networks:
  local:
    driver: bridge  # Define a single custom network
